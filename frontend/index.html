<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Data Analyst</title>

    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">

    <header>
        <h1>🤖 AI Data Analyst</h1>

        <p>
            Upload a dataset, ask questions in plain English,
            and get SQL queries, insights, results, and charts.
        </p>
    </header>

    <!-- CSV Upload Section -->

    <div class="upload-box">

        <input
            type="file"
            id="csvFile"
            accept=".csv"
        >

        <button
            type="button"
            onclick="uploadCSV()"
        >
            Upload CSV
        </button>

    </div>

    <!-- Upload Status Message -->

    <div id="uploadStatus"></div>

    <!-- Query Section -->

    <div class="search-box">

        <input
            id="q"
            type="text"
            placeholder="e.g. Show all employees with salary greater than 50000"
        >

        <button
            id="btn"
            type="button"
            onclick="askQuestion()"
        >
            Analyze
        </button>

    </div>

    <!-- Output Section -->

    <div id="out"></div>

</div>

<script src="js/app.js"></script>

</body>
</html>
